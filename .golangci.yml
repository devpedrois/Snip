version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - contextcheck
    - errorlint
    - gosec
    - misspell
    - noctx
    - prealloc

formatters:
  enable:
    - gofmt
    - goimports

settings:
  gosec:
    excludes:
      - G115

  goimports:
    local-prefixes:
      - github.com/devpedrois/snip

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
